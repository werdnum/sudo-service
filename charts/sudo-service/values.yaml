# Default values for the sudo-service chart.
#
# The defaults below reproduce the configuration that previously lived as raw
# manifests in werdnum/kube-config
# (kubernetes/manifests/workloads/sudo-service/). Rendering the chart with
# these defaults is intended to be byte-for-byte equivalent to those manifests,
# so adopting the chart is a zero-diff change. Environment-specific values
# (hostnames, OIDC issuer, Cloudflare tunnel target, ...) are exposed here so
# the chart can be reused on a different cluster.

# Namespace every namespaced resource is created in. Also referenced by the
# cluster-scoped ValidatingAdmissionPolicies (via the controller/executor SA
# usernames) and by the NetworkPolicy/VAP namespace selectors. The Deployment
# passes its actual metadata.namespace to the controller as POD_NAMESPACE, so
# runtime API/cache selection stays aligned with this rendered namespace.
namespace: sudo-service
# Controller container image. The digest is rewritten by the chart's build
# workflow on each push to main; pin it here so deploys are reproducible.
image:
  repository: ghcr.io/werdnum/sudo-service
  # Either a digest (preferred, set by CI) or a tag. Digest wins if both set.
  digest: "sha256:7cf8cc18eececc7f2b77fe065d363cf1a1f68da9c0d5554ffe241b581ee91d89"
  tag: ""
  pullPolicy: IfNotPresent
# imagePullSecrets are mirrored into the namespace out-of-band (e.g. by the
# emberstack reflector in the reference cluster).
imagePullSecrets:
  - name: ghcr-secret
# Controller resource requests/limits.
resources:
  requests:
    cpu: 20m
    memory: 64Mi
  limits:
    cpu: 500m
    memory: 256Mi
# Public base URL the controller advertises in approval links.
publicBaseURL: https://sudo.andrewgarrett.dev
# Keycloak / OIDC settings shared by the controller (JWT verification) and the
# oauth2-proxy sidecar (login flow).
keycloak:
  issuerURL: https://id.andrewgarrett.dev/realms/master
  audience: sudo-service
  clientID: sudo-service
# OIDC group whose members may approve requests via the admin UI.
adminGroup: kubernetes-cluster-admin
# Optional AI permission assessments. When enabled, the controller calls an
# OpenAI-compatible chat-completions endpoint once per request (as it enters
# Pending) for a structured factual sentence describing what approval permits.
# The same sentence is cached on the SudoRequest and shown on the approve page
# and Pushover notification. Generation is best-effort. Disabled by default;
# enabling it only requires providing an API key Secret. Point baseURL at any
# compatible gateway to switch providers/models.
openai:
  enabled: false
  # OpenAI-compatible API base URL (no trailing /chat/completions).
  baseURL: https://api.openai.com/v1
  # Model id served by baseURL.
  model: gpt-5.4-mini
  # Secret holding the API key. NOT created by this chart (managed out-of-band,
  # e.g. as a SealedSecret); only referenced by name.
  secretName: sudo-service-openai
  # Key within secretName holding the API key.
  secretKey: api-key
# Redis/KeyDB backing the oauth2-proxy session store.
redis:
  connectionURL: redis://keydb.redis.svc.cluster.local/3
# oauth2-proxy sidecar.
oauth2Proxy:
  image: quay.io/oauth2-proxy/oauth2-proxy:v7.15.2-arm64@sha256:138539bae490fd122d151d6f7f12d028dd917fba5c582885ce376c08a2a33c67
  resources:
    requests:
      cpu: 20m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi
# Secret names consumed by the controller + oauth2-proxy. The Secrets
# themselves are NOT part of this chart (they are cluster-specific and managed
# out-of-band, e.g. as SealedSecrets); only their names are referenced.
secrets:
  # Keys: token, user_key
  pushover: sudo-service-pushover
  # Keys: client-secret, cookie-secret
  oauth2Proxy: sudo-service-oauth2-proxy
# Namespace-level Goldilocks (Fairwinds VPA recommender) opt-in.
goldilocks:
  enabled: true
  vpaUpdateMode: "Off"
  vpaResourcePolicy: '{"containerPolicies":[{"containerName":"*","controlledValues":"RequestsOnly","maxAllowed":{"cpu":"500m","memory":"512Mi"}}]}'
ingress:
  enabled: true
  className: nginx
  host: sudo.andrewgarrett.dev
  clusterIssuer: letsencrypt-prod
  tlsSecretName: sudo-service-tls
  # Routes through Cloudflare Tunnel so approval pushes work from phones
  # outside the LAN. Set to "" to omit the external-dns target annotation.
  cloudflareTunnelTarget: 6422e862-06ea-4b65-ae99-cad51841931c.cfargotunnel.com
# Create the ServiceMonitor (requires the Prometheus operator CRDs).
serviceMonitor:
  enabled: true
# Create the NetworkPolicy locking ingress to the controller Pod.
networkPolicy:
  enabled: true
  # Namespace (by metadata.name) allowed to reach the controller on :3000 for
  # the admin UI. In-cluster pods are additionally allowed (for the requester
  # API); see templates/networkpolicy.yaml.
  ingressNamespace: ingress
  # Namespace allowed to scrape :8080 /metrics.
  monitoringNamespace: monitoring
