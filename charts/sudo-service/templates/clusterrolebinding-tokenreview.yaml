# Binds the controller SA to the built-in `system:auth-delegator` ClusterRole so
# it can authenticate requester SA tokens with TokenReview and authorize those
# identities with SubjectAccessReview. Keep this binding's roleRef stable
# because roleRef is immutable during Helm upgrades.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: sudo-service-controller-tokenreview
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: system:auth-delegator
subjects:
  - kind: ServiceAccount
    name: sudo-service-controller-sa
    namespace: {{ .Values.namespace }}
