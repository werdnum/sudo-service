apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: sudorequests.sudo.andrewgarrett.dev
spec:
  group: sudo.andrewgarrett.dev
  scope: Namespaced
  names:
    plural: sudorequests
    singular: sudorequest
    kind: SudoRequest
    shortNames:
      - sudoreq
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Phase
          type: string
          jsonPath: .status.phase
        - name: Requester
          type: string
          jsonPath: .spec.requester
        - name: ExitCode
          type: integer
          jsonPath: .status.exitCode
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
      schema:
        openAPIV3Schema:
          type: object
          required:
            - spec
          properties:
            spec:
              type: object
              required:
                - requester
                - reason
                - command
              properties:
                requester:
                  type: string
                  description: >-
                    Logical caller identity. Enforced server-side by a
                    ValidatingAdmissionPolicy against request.userInfo.username,
                    so this cannot be spoofed across SAs on direct CRD writes.
                reason:
                  type: string
                  description: Free-text shown to the human reviewer.
                command:
                  type: string
                  description: Exact argv (single string) executed under cluster-admin.
                image:
                  type: string
                  description: >-
                    Container image the executor Job runs. Defaults to alpine/k8s:1.35.5.
                    The human reviewer is the trust boundary; the approve page shows
                    image + command together.
                ttlSecondsAfterApproval:
                  type: integer
                  format: int32
                  default: 3600
                  minimum: 0
                  # Capped at 3600 to match the executor VAP's ttlSecondsAfterFinished
                  # guard (kubernetes/manifests/workloads/sudo-service/validatingadmissionpolicy-executor.yaml).
                  maximum: 3600
                namespace:
                  type: string
                  description: >-
                    Namespace the executor Job runs in. Defaults to the controller
                    namespace (sudo-service). Targeting another namespace lets the
                    command mount that namespace's Secrets/PVCs as files, but the Job
                    then runs under that namespace's unprivileged default
                    ServiceAccount — cluster-admin is only available in the
                    controller namespace.
                stdin:
                  type: string
                  description: >-
                    Optional payload fed to the command's standard input. Removes the
                    need to smuggle a multi-line document (a manifest piped to
                    'kubectl apply -f -', a heredoc, ...) through the single-string
                    command field. Materialised into a short-TTL Secret mounted into
                    the executor pod; never interpolated into the shell.
                privileges:
                  type: object
                  description: >-
                    Explicit, approval-surfaced capability toggles. Each is rendered
                    on the approve page so the reviewer sees what power is handed over.
                  properties:
                    clusterAdmin:
                      type: boolean
                      description: >-
                        Run under the cluster-admin executor ServiceAccount. Only valid
                        in the controller namespace, where it defaults to true; elsewhere
                        the Job runs under the namespace default ServiceAccount.
                # The structured pod fields below reuse the upstream Kubernetes
                # shapes (env, envFrom, volumes, volumeMounts, containers). The
                # controller narrows them to a reviewable allowlist in Go
                # (validateSpecExtras) — rejecting e.g. hostPath volumes or init
                # containers that set their own securityContext — so the apiserver
                # schema only needs to preserve the structure, not re-encode it.
                env:
                  type: array
                  items:
                    type: object
                    x-kubernetes-preserve-unknown-fields: true
                envFrom:
                  type: array
                  items:
                    type: object
                    x-kubernetes-preserve-unknown-fields: true
                volumes:
                  type: array
                  items:
                    type: object
                    x-kubernetes-preserve-unknown-fields: true
                volumeMounts:
                  type: array
                  items:
                    type: object
                    x-kubernetes-preserve-unknown-fields: true
                initContainers:
                  type: array
                  items:
                    type: object
                    x-kubernetes-preserve-unknown-fields: true
                # Registry-credential Secret references (LocalObjectReference,
                # {name}) the kubelet uses to pull the executor/init images from a
                # private registry. Never exposed to the container, so unlike mounted
                # or env Secret references they need no allowlist; the controller only
                # checks each has a name and surfaces them to the reviewer.
                imagePullSecrets:
                  type: array
                  items:
                    type: object
                    x-kubernetes-preserve-unknown-fields: true
            status:
              type: object
              properties:
                phase:
                  type: string
                  enum: [Pending, Approved, Denied, Executed, Failed, Expired]
                approvedBy: {type: string}
                approvedAt: {type: string, format: date-time}
                deniedBy: {type: string}
                deniedAt: {type: string, format: date-time}
                denialReason: {type: string}
                exitCode: {type: integer, format: int32}
                outputSecretRef:
                  type: string
                  description: >-
                    Name of the short-TTL Secret in sudo-service namespace holding
                    stdout/stderr. Reads go through the controller HTTP API, not
                    direct RBAC.
                stdinSecretName:
                  type: string
                  description: >-
                    Controller-minted, unguessable name of the Secret holding
                    spec.stdin, recorded before the executor Job is created so a
                    requester cannot pre-create a predictable Secret to swap the
                    approved payload.
                summary:
                  type: string
                  description: >-
                    Optional AI-generated, human-readable review aid for the
                    command, produced once when the request enters Pending and
                    cached here. A review aid only — never a substitute for the
                    human reviewer reading the command. Empty when the summarizer
                    is disabled or generation failed.
                executorJobName:
                  type: string
                  description: >-
                    Controller-minted, unguessable name of the executor Job,
                    recorded before the Job is created so a requester can't
                    pre-create a predictable Job for the controller to adopt.
                executorJobUID:
                  type: string
                  description: >-
                    UID of the created executor Job. Distinguishes "not yet
                    created" from "created then GC'd" (in which case the request
                    is failed rather than replayed), and detects a replaced Job.
                pushoverRequestID: {type: string}
                approvalTokenHash:
                  type: string
                  description: >-
                    SHA-256 hex of the one-time approval token. Plaintext token is
                    only ever sent in the Pushbullet push URL.
                approvalTokenExpiresAt: {type: string, format: date-time}
