apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: sudorequests.sudo.andrewgarrett.dev
spec:
  group: sudo.andrewgarrett.dev
  scope: Namespaced
  names:
    plural: sudorequests
    singular: sudorequest
    kind: SudoRequest
    shortNames:
      - sudoreq
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Phase
          type: string
          jsonPath: .status.phase
        - name: Requester
          type: string
          jsonPath: .spec.requester
        - name: ExitCode
          type: integer
          jsonPath: .status.exitCode
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
      schema:
        openAPIV3Schema:
          type: object
          required:
            - spec
          properties:
            spec:
              type: object
              required:
                - requester
                - reason
                - command
              x-kubernetes-validations:
                - rule: >-
                    !(has(self.profile) && self.profile != '' &&
                      has(self.image) && self.image != '')
                  message: profile and image are mutually exclusive
                - rule: self == oldSelf
                  message: spec is immutable after request creation
              properties:
                requester:
                  type: string
                  description: >-
                    Logical caller identity. Enforced server-side by a
                    ValidatingAdmissionPolicy against request.userInfo.username,
                    so this cannot be spoofed across SAs on direct CRD writes.
                reason:
                  type: string
                  description: Free-text shown to the human reviewer.
                command:
                  type: string
                  description: Exact argv (single string) executed under cluster-admin.
                action:
                  type: object
                  additionalProperties: false
                  description: >-
                    Optional server-validated semantic action. The controller requires
                    command to equal its canonical expansion before requesting approval.
                  required: [version, operation, resources]
                  properties:
                    version:
                      type: string
                      enum: [v1]
                    operation:
                      type: string
                      enum: [job.delete, cronjob.run, workload.restart, secret.read]
                    resources:
                      type: array
                      minItems: 1
                      items:
                        type: object
                        additionalProperties: false
                        required: [namespace, kind, name]
                        properties:
                          namespace: {type: string}
                          kind: {type: string}
                          name: {type: string}
                    key: {type: string}
                    jobName: {type: string}
                image:
                  type: string
                  description: >-
                    Arbitrary container image the executor Job runs. Mutually exclusive
                    with profile. When neither is set, the server's default profile is
                    used.
                    The human reviewer is the trust boundary; the approve page shows
                    image + command together.
                profile:
                  type: string
                  description: >-
                    Friendly server-owned executor profile alias. The controller
                    resolves it to a digest-pinned image and records that exact digest
                    in status before approval. Mutually exclusive with image.
                ttlSecondsAfterApproval:
                  type: integer
                  format: int32
                  default: 3600
                  minimum: 0
                  # Capped at 3600 to match the executor VAP's ttlSecondsAfterFinished
                  # guard (kubernetes/manifests/workloads/sudo-service/validatingadmissionpolicy-executor.yaml).
                  maximum: 3600
                namespace:
                  type: string
                  description: >-
                    Namespace the executor Job runs in. Defaults to the controller
                    namespace (sudo-service). Targeting another namespace lets the
                    command mount that namespace's Secrets/PVCs as files, but the Job
                    then runs under that namespace's unprivileged default
                    ServiceAccount — cluster-admin is only available in the
                    controller namespace.
                stdin:
                  type: string
                  description: >-
                    Optional payload fed to the command's standard input. Removes the
                    need to smuggle a multi-line document (a manifest piped to
                    'kubectl apply -f -', a heredoc, ...) through the single-string
                    command field. Materialised into a short-TTL Secret mounted into
                    the executor pod; never interpolated into the shell.
                privileges:
                  type: object
                  description: >-
                    Explicit, approval-surfaced capability toggles. Each is rendered
                    on the approve page so the reviewer sees what power is handed over.
                  properties:
                    clusterAdmin:
                      type: boolean
                      description: >-
                        Run under the cluster-admin executor ServiceAccount. Only valid
                        in the controller namespace, where it defaults to true; elsewhere
                        the Job runs under the namespace default ServiceAccount.
                # The structured pod fields below reuse the upstream Kubernetes
                # shapes (env, envFrom, volumes, volumeMounts, containers). The
                # controller narrows them to a reviewable allowlist in Go
                # (validateSpecExtras) — rejecting e.g. hostPath volumes or init
                # containers that set their own securityContext — so the apiserver
                # schema only needs to preserve the structure, not re-encode it.
                env:
                  type: array
                  items:
                    type: object
                    x-kubernetes-preserve-unknown-fields: true
                envFrom:
                  type: array
                  items:
                    type: object
                    x-kubernetes-preserve-unknown-fields: true
                volumes:
                  type: array
                  items:
                    type: object
                    x-kubernetes-preserve-unknown-fields: true
                volumeMounts:
                  type: array
                  items:
                    type: object
                    x-kubernetes-preserve-unknown-fields: true
                initContainers:
                  type: array
                  items:
                    type: object
                    x-kubernetes-preserve-unknown-fields: true
                # Registry-credential Secret references (LocalObjectReference,
                # {name}) the kubelet uses to pull the executor/init images from a
                # private registry. Never exposed to the container, so unlike mounted
                # or env Secret references they need no allowlist; the controller only
                # checks each has a name and surfaces them to the reviewer.
                imagePullSecrets:
                  type: array
                  items:
                    type: object
                    x-kubernetes-preserve-unknown-fields: true
            status:
              type: object
              properties:
                phase:
                  type: string
                  enum: [Pending, Approved, Denied, Executed, Failed, Expired]
                approvedBy: {type: string}
                approvedAt: {type: string, format: date-time}
                deniedBy: {type: string}
                deniedAt: {type: string, format: date-time}
                denialReason: {type: string}
                failureReason:
                  type: string
                  description: >-
                    Explains a Failed request whose command outcome is unknown
                    (e.g. the executor Job disappeared before completion).
                resolvedProfile:
                  type: string
                  description: Controller-resolved friendly executor profile alias.
                resolvedImage:
                  type: string
                  description: >-
                    Exact controller-resolved image digest shown during review and
                    subsequently used for execution.
                preflightWarnings:
                  type: array
                  items: {type: string}
                  description: >-
                    Conservative static warnings recorded before approval. Advisory
                    only; they do not claim runtime certainty.
                exitCode: {type: integer, format: int32}
                outputSecretRef:
                  type: string
                  description: >-
                    Name of the short-TTL Secret in sudo-service namespace holding
                    stdout/stderr. Reads go through the controller HTTP API, not
                    direct RBAC.
                outputCaptureState:
                  type: string
                  enum: [Complete, Truncated, Failed]
                  description: >-
                    Outcome of reading and bounding the terminated container's
                    logs. Empty on records written by older controllers.
                outputDeliveryState:
                  type: string
                  enum: [Available, Failed]
                  description: >-
                    Whether retained output was made available in outputSecretRef.
                    Empty when delivery was not attempted or on older records.
                outputFailureReason:
                  type: string
                  description: Output capture or delivery error, independent of command exit.
                outputTotalBytes: {type: integer, format: int64, minimum: 0}
                outputRetainedBytes: {type: integer, format: int64, minimum: 0}
                outputSHA256:
                  type: string
                  pattern: '^[0-9a-f]{64}$'
                  description: SHA-256 of the complete observed output stream.
                stdinSecretName:
                  type: string
                  description: >-
                    Controller-minted, unguessable name of the Secret holding
                    spec.stdin, recorded before the executor Job is created so a
                    requester cannot pre-create a predictable Secret to swap the
                    approved payload.
                summary:
                  type: string
                  description: >-
                    Optional AI-generated, human-readable review aid for the
                    command, produced once when the request enters Pending and
                    cached here. A review aid only — never a substitute for the
                    human reviewer reading the command. Empty when the summarizer
                    is disabled or generation failed.
                permissionAssessment:
                  type: object
                  # Keep this structural schema compatible with Kubernetes:
                  # declared properties cannot be combined with
                  # additionalProperties: false. Strict JSON decoding in the
                  # summarizer rejects unknown model fields.
                  description: >-
                    Optional versioned, structured statement of what pressing
                    Approve permits. The raw command and effective Pod spec remain
                    ground truth. Empty when generation is disabled or fails.
                  required: [request, effects, schemaVersion, promptVersion, model, generatedAt]
                  properties:
                    request:
                      type: string
                      minLength: 1
                    effects:
                      type: array
                      minItems: 1
                      # Kubernetes rejects uniqueItems on CRDs because its
                      # validation cost is quadratic. Go validation rejects
                      # duplicate effects before this status is persisted.
                      items:
                        type: string
                        enum:
                          - READ_ONLY
                          - CHANGES_CLUSTER
                          - CREATES_RESOURCE
                          - RESTARTS_WORKLOAD
                          - DELETES_RESOURCE
                          - EXPORTS_DATA
                          - READS_SECRET
                          - USES_CREDENTIALS
                          - EXTERNAL_EGRESS
                          - HOST_ACCESS
                          - SECURITY_CONFIG
                          - BROAD_SCOPE
                          - CLEANUP_INCLUDED
                          - NON_DEFAULT_IMAGE
                    schemaVersion: {type: string}
                    promptVersion: {type: string}
                    model: {type: string}
                    generatedAt: {type: string, format: date-time}
                permissionAssessmentState:
                  type: string
                  enum: [Pending, Generated, Failed]
                  description: >-
                    Best-effort model generation state, independent of approval
                    and notification delivery. Empty on older records or when
                    generation is disabled.
                executorJobName:
                  type: string
                  description: >-
                    Controller-minted, unguessable name of the executor Job,
                    recorded before the Job is created so a requester can't
                    pre-create a predictable Job for the controller to adopt.
                executorJobUID:
                  type: string
                  description: >-
                    UID of the created executor Job. Distinguishes "not yet
                    created" from "created then GC'd" (in which case the request
                    is failed rather than replayed), and detects a replaced Job.
                pushoverRequestID: {type: string}
                notificationState:
                  type: string
                  enum: [Pending, Delivered]
                  description: >-
                    Approval-notification delivery state, independent of phase.
                    Empty on records written by older controllers.
                notificationAttempts: {type: integer, format: int32, minimum: 0}
                notificationLastAttemptAt: {type: string, format: date-time}
                notificationNextAttemptAt:
                  type: string
                  format: date-time
                  description: >-
                    Earliest time a failed approval notification may be retried.
                notificationDeliveredAt: {type: string, format: date-time}
                notificationLastError: {type: string}
                approvalTokenHash:
                  type: string
                  description: >-
                    SHA-256 hex of the one-time approval token. Plaintext is kept
                    in a controller-owned Secret and sent only in the Pushover URL.
                approvalTokenExpiresAt: {type: string, format: date-time}
                approvalTokenSecretName:
                  type: string
                  description: >-
                    Controller-owned Secret containing the notification token so
                    delivery retries reuse one persisted approval link.
