{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: sudo-service
  namespace: {{ .Values.namespace }}
  annotations:
    cert-manager.io/cluster-issuer: {{ .Values.ingress.clusterIssuer }}
    {{- if .Values.ingress.cloudflareTunnelTarget }}
    # Routes through Cloudflare Tunnel so approval pushes work from phones outside the LAN.
    # The cloudflared ConfigMap also needs the host added to its ingress list.
    external-dns.alpha.kubernetes.io/target: {{ .Values.ingress.cloudflareTunnelTarget }}
    {{- end }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  tls:
    - hosts:
        - {{ .Values.ingress.host }}
      secretName: {{ .Values.ingress.tlsSecretName }}
  rules:
    - host: {{ .Values.ingress.host }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: sudo-service
                port:
                  number: 80
{{- end }}
