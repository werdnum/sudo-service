{{define "header"}}
<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>sudo</title>
    <style>
        :root {
            --primary-color: #2563eb;
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-color: #1e293b;
            --text-muted: #64748b;
            --border-color: #e2e8f0;
            --success-color: #16a34a;
            --error-color: #dc2626;
            --warn-color: #ca8a04;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.5;
            margin: 0;
            padding: 0;
        }
        .container {
            max-width: 800px;
            margin: 2rem auto;
            padding: 0 1rem;
        }
        header {
            margin-bottom: 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        h1 {
            font-size: 1.5rem;
            font-weight: 700;
            margin: 0;
        }
        .card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 0.5rem;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            box-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.1);
        }
        .btn {
            display: inline-block;
            padding: 0.5rem 1rem;
            border-radius: 0.375rem;
            font-weight: 600;
            text-decoration: none;
            cursor: pointer;
            border: 0;
            font-size: 0.875rem;
            text-align: center;
        }
        .btn-primary {
            background-color: var(--primary-color);
            color: white;
        }
        .btn-success {
            background-color: var(--success-color);
            color: white;
        }
        .btn-error {
            background-color: var(--error-color);
            color: white;
        }
        .badge {
            display: inline-block;
            padding: 0.125rem 0.625rem;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
        }
        .badge-pending { background-color: #fef9c3; color: #854d0e; }
        .badge-executed { background-color: #dcfce7; color: #166534; }
        .badge-denied { background-color: #fee2e2; color: #991b1b; }
        .badge-failed { background-color: #fee2e2; color: #991b1b; }
        .badge-expired { background-color: #f1f5f9; color: #475569; }

        dt { font-weight: 600; color: var(--text-muted); margin-top: 1rem; font-size: 0.875rem; }
        dd { margin: 0.25rem 0 0 0; font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; background: #f1f5f9; padding: 0.5rem; border-radius: 0.25rem; white-space: pre-wrap; word-break: break-all; }

        .request-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 0;
            border-bottom: 1px solid var(--border-color);
        }
        .request-item:last-child { border-bottom: 0; }
        .request-info { flex: 1; }
        .request-actions { margin-left: 1rem; }
        .timestamp { font-size: 0.75rem; color: var(--text-muted); }

        .footer {
            margin-top: 4rem;
            font-size: 0.875rem;
            color: var(--text-muted);
            text-align: center;
        }

        @media (max-width: 640px) {
            .request-item { flex-direction: column; align-items: flex-start; }
            .request-actions { margin-left: 0; margin-top: 0.5rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1><a href="/" style="text-decoration: none; color: inherit;">sudo</a></h1>
            <div class="user-info" style="font-size: 0.875rem; color: var(--text-muted);">
                {{.User}}
            </div>
        </header>
        <main>
{{end}}

{{define "footer"}}
        </main>
        <footer class="footer">
            Sudo Service &bull; Signed in as {{.User}} ({{.UserEmail}})
        </footer>
    </div>
</body>
</html>
{{end}}
