{{template "header" .}}
<div class="card" style="text-align: center; padding: 2.5rem 1.5rem;">
    {{if eq .Variant "success"}}
    <div style="width: 3rem; height: 3rem; margin: 0 auto 1.25rem; border-radius: 9999px; background: #dcfce7; color: #166534; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; line-height: 1;">&check;</div>
    {{else}}
    <div style="width: 3rem; height: 3rem; margin: 0 auto 1.25rem; border-radius: 9999px; background: #fee2e2; color: #991b1b; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; line-height: 1;">&times;</div>
    {{end}}
    <h2 style="font-size: 1.25rem; margin: 0 0 0.5rem;">{{.Title}}</h2>
    {{if .Message}}<p style="color: var(--text-muted); margin: 0 0 1rem;">{{.Message}}</p>{{end}}
    {{if .UID}}<p style="margin: 0 0 1.5rem;"><code style="font-size: 0.75rem; background: #f1f5f9; padding: 0.25rem 0.5rem; border-radius: 0.25rem; word-break: break-all;">{{.UID}}</code></p>{{end}}
    <a href="/" class="btn btn-primary">Back to home</a>
</div>
{{template "footer" .}}
