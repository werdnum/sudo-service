name: Go Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# The image build (build.yaml) only compiles the binary; it never runs the Go
# test suite. This workflow runs `go vet` and `go test` so controller regressions
# — e.g. the post-approval status-update race in issue #20, guarded by the
# cache-lag reconcile tests — are caught on PRs instead of in production.
jobs:
  test:
    name: go test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6

      - name: Set up Go
        uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5
        with:
          go-version: '1.24'
          cache: true

      - name: go vet
        run: go vet ./...

      - name: go test
        run: go test -race ./...
