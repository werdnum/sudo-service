name: Build and Push sudo-service
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '17 3 23 * *'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Custom tag for the images (defaults to timestamp)'
        required: false
        type: string
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true
env:
  REGISTRY: ghcr.io
  IMAGE_NAME: sudo-service
permissions:
  contents: write
  packages: write
jobs:
  prepare:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      tag: ${{ steps.tags.outputs.tag }}
      should-push: ${{ steps.tags.outputs.should-push }}
      platforms: ${{ steps.tags.outputs.platforms }}
      image-path: ${{ steps.tags.outputs.image-path }}
      cache-to: ${{ steps.tags.outputs.cache-to }}
    steps:
      - name: Generate tags and determine build strategy
        id: tags
        run: |
          # Construct image path: ghcr.io/owner/sudo-service
          # Lowercase the owner name to avoid issues with docker
          OWNER="$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')"
          IMAGE_PATH="${{ env.REGISTRY }}/${OWNER}/${{ env.IMAGE_NAME }}"
          echo "image-path=${IMAGE_PATH}" >> "$GITHUB_OUTPUT"

          # Determine tag and push strategy
          SHOULD_PUSH="false"
          SHORT_SHA="$(echo "${{ github.sha }}" | cut -c1-7)"

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
             if [ -n "${{ github.event.inputs.tag }}" ]; then
               TAG="${{ github.event.inputs.tag }}"
             else
               TAG="$(date +%Y%m%d_%H%M%S)-${SHORT_SHA}"
             fi
             SHOULD_PUSH="true"
          elif [ "${{ github.event_name }}" = "push" ] || [ "${{ github.event_name }}" = "schedule" ]; then
             TAG="$(date +%Y%m%d_%H%M%S)-${SHORT_SHA}"
             SHOULD_PUSH="true"
          else
             # pull_request
             TAG="pr-${{ github.event.number }}"
             SHOULD_PUSH="false"
          fi

          {
            echo "tag=${TAG}"
            echo "should-push=${SHOULD_PUSH}"
            # The cluster runs arm64; amd64 is built too so the image is
            # portable. The Dockerfile cross-compiles from the native build
            # host (see --platform=$BUILDPLATFORM), so this needs no QEMU.
            echo "platforms=linux/amd64,linux/arm64"
          } >> "$GITHUB_OUTPUT"

          # Determine cache strategy
          {
            echo "cache-to<<EOF"
            echo "type=gha,mode=max,scope=${IMAGE_NAME}"
            if [ "${SHOULD_PUSH}" = "true" ]; then
              echo "type=registry,ref=${IMAGE_PATH}:buildcache,mode=max"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

  build-sudo-service:
    needs: prepare
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout code
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
      - name: Log in to Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and conditionally push image
        id: build
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6
        with:
          context: .
          file: Dockerfile
          platforms: ${{ needs.prepare.outputs.platforms }}
          push: ${{ needs.prepare.outputs.should-push }}
          tags: |
            ${{ needs.prepare.outputs.image-path }}:${{ needs.prepare.outputs.tag }}
            ${{ needs.prepare.outputs.image-path }}:latest
          cache-from: |
            type=gha,scope=${{ env.IMAGE_NAME }}
            type=registry,ref=${{ needs.prepare.outputs.image-path }}:latest
            type=registry,ref=${{ needs.prepare.outputs.image-path }}:buildcache
          cache-to: ${{ needs.prepare.outputs.cache-to }}

      - name: Update chart image digest
        if: needs.prepare.outputs.should-push == 'true'
        env:
          IMAGE_DIGEST: ${{ steps.build.outputs.digest }}
          IMAGE_TAG: ${{ needs.prepare.outputs.tag }}
        run: |
          set -e

          VALUES_PATH="charts/sudo-service/values.yaml"
          CHART_PATH="charts/sudo-service/Chart.yaml"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # ubuntu-latest ships mikefarah yq, but fall back to a user-writable
          # install if it's ever missing.
          if ! command -v yq >/dev/null 2>&1; then
            YQ_VERSION="v4.44.3"
            mkdir -p "${RUNNER_TEMP}/bin"
            curl -sSL "https://github.com/mikefarah/yq/releases/download/${YQ_VERSION}/yq_linux_amd64" \
              -o "${RUNNER_TEMP}/bin/yq"
            chmod +x "${RUNNER_TEMP}/bin/yq"
            export PATH="${RUNNER_TEMP}/bin:${PATH}"
          fi

          # Pin the freshly-built digest as the chart default so ArgoCD (which
          # tracks this chart at HEAD) rolls the new image out. appVersion is
          # bumped to the human-readable tag for visibility.
          yq eval -i ".image.digest = \"${IMAGE_DIGEST}\"" "${VALUES_PATH}"
          yq eval -i ".appVersion = \"${IMAGE_TAG}\"" "${CHART_PATH}"

          if git diff --quiet; then
            echo "No changes to commit"
          else
            git add "${VALUES_PATH}" "${CHART_PATH}"
            git commit -m "chore: update image to ${IMAGE_DIGEST:0:19}

          Source: ${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}"
            git pull --rebase
            git push
            echo "Updated chart with new image digest"
          fi
